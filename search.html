<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>shhhhh.</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: #020204;
      font-family: 'Fredoka One', cursive;
    }

    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      filter: blur(80px) saturate(1.4);
      overflow: hidden;
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      opacity: 0.28;
      animation: drift linear infinite;
    }

    .orb:nth-child(1){width:520px;height:520px;background:radial-gradient(circle,#7b2ff7,transparent 70%);top:10%;left:5%;animation-duration:22s;animation-delay:0s;}
    .orb:nth-child(2){width:400px;height:400px;background:radial-gradient(circle,#2dd4bf,transparent 70%);top:55%;left:60%;animation-duration:18s;animation-delay:-6s;}
    .orb:nth-child(3){width:350px;height:350px;background:radial-gradient(circle,#f472b6,transparent 70%);top:20%;left:70%;animation-duration:25s;animation-delay:-12s;}
    .orb:nth-child(4){width:300px;height:300px;background:radial-gradient(circle,#3b82f6,transparent 70%);top:70%;left:15%;animation-duration:20s;animation-delay:-4s;}
    .orb:nth-child(5){width:250px;height:250px;background:radial-gradient(circle,#facc15,transparent 70%);top:40%;left:40%;animation-duration:30s;animation-delay:-9s;}

    @keyframes drift {
      0%   { transform: translate(0, 0) scale(1); }
      25%  { transform: translate(60px, -80px) scale(1.08); }
      50%  { transform: translate(-40px, 60px) scale(0.95); }
      75%  { transform: translate(80px, 40px) scale(1.05); }
      100% { transform: translate(0, 0) scale(1); }
    }

    .particles {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
    }

    .particle {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.18);
      animation: float linear infinite;
    }

    @keyframes float {
      0%   { transform: translateY(110vh) scale(0.6); opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 0.6; }
      100% { transform: translateY(-10vh) scale(1.1); opacity: 0; }
    }

    .content {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 36px;
    }

    h1 {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(72px, 14vw, 160px);
      letter-spacing: 0.04em;
      color: #fff;
      text-shadow:
        0 0 30px rgba(123,47,247,0.8),
        0 0 60px rgba(123,47,247,0.4),
        4px 4px 0 rgba(244,114,182,0.5),
        8px 8px 0 rgba(45,212,191,0.3);
      animation: titlePulse 4s ease-in-out infinite;
      user-select: none;
    }

    @keyframes titlePulse {
      0%, 100% { text-shadow: 0 0 30px rgba(123,47,247,0.8), 0 0 60px rgba(123,47,247,0.4), 4px 4px 0 rgba(244,114,182,0.5), 8px 8px 0 rgba(45,212,191,0.3); }
      50%       { text-shadow: 0 0 50px rgba(244,114,182,0.9), 0 0 100px rgba(244,114,182,0.4), 4px 4px 0 rgba(45,212,191,0.6), 8px 8px 0 rgba(123,47,247,0.4); }
    }

    .search-wrapper {
      width: min(560px, 88vw);
      position: relative;
    }

    .search-bar {
      width: 100%;
      padding: 18px 56px 18px 24px;
      font-family: 'Fredoka One', cursive;
      font-size: 20px;
      letter-spacing: 0.03em;
      color: #e2e8f0;
      background: rgba(2, 2, 6, 0.88);
      border: 1.5px solid rgba(255,255,255,0.1);
      border-radius: 50px;
      outline: none;
      backdrop-filter: blur(20px) saturate(1.5);
      -webkit-backdrop-filter: blur(20px) saturate(1.5);
      box-shadow:
        0 8px 32px rgba(0,0,0,0.5),
        inset 0 1px 0 rgba(255,255,255,0.06);
      transition: border-color 0.3s, box-shadow 0.3s;
      caret-color: #7b2ff7;
    }

    .search-bar::placeholder { color: rgba(148,163,184,0.5); }

    .search-bar:focus {
      border-color: rgba(123,47,247,0.6);
      box-shadow:
        0 8px 40px rgba(0,0,0,0.6),
        0 0 0 3px rgba(123,47,247,0.18),
        inset 0 1px 0 rgba(255,255,255,0.08);
    }

    .search-btn {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: none;
      background: linear-gradient(135deg, #7b2ff7, #f472b6);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 2px 12px rgba(123,47,247,0.5);
    }

    .search-btn:hover {
      transform: translateY(-50%) scale(1.1);
      box-shadow: 0 4px 20px rgba(123,47,247,0.7);
    }

    .search-btn svg { width:18px; height:18px; stroke:#fff; fill:none; stroke-width:2.5; stroke-linecap:round; stroke-linejoin:round; }

    .bookmarks {
      display: flex;
      gap: 28px;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 4px;
    }

    .bookmark {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      cursor: pointer;
      transition: transform 0.2s ease, filter 0.2s ease;
    }

    .bookmark:hover {
      transform: translateY(-6px) scale(1.1);
      filter: brightness(1.25);
    }

    .bookmark-icon {
      width: 80px;
      height: 80px;
      border-radius: 20px;
      background: rgba(2, 2, 6, 0.82);
      border: 1.5px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 6px 24px rgba(0,0,0,0.7);
      overflow: hidden;
    }

    .bookmark-icon img {
      width: 40px;
      height: 40px;
      object-fit: contain;
    }

    .bookmark-label {
      font-family: 'Fredoka One', cursive;
      font-size: 14px;
      color: rgba(180, 190, 210, 0.65);
      letter-spacing: 0.03em;
    }

    /* ── Modal overlay ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(2, 2, 6, 0.55);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
    }

    .modal-overlay.show {
      opacity: 1;
      pointer-events: all;
    }

    /* ── Modal card ── */
    .modal {
      position: relative;
      width: min(340px, 86vw);
      background: rgba(8, 5, 18, 0.96);
      border: 1px solid rgba(123,47,247,0.25);
      border-radius: 22px;
      padding: 28px 26px 22px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 10px;
      box-shadow:
        0 20px 50px rgba(0,0,0,0.75),
        0 0 60px rgba(123,47,247,0.08),
        inset 0 1px 0 rgba(255,255,255,0.04);
      transform: translateY(16px) scale(0.97);
      transition: transform 0.3s cubic-bezier(0.34,1.46,0.64,1), opacity 0.25s ease;
      opacity: 0;
    }

    .modal-overlay.show .modal {
      transform: translateY(0) scale(1);
      opacity: 1;
    }

    .modal-title {
      font-family: 'Fredoka One', cursive;
      font-size: 20px;
      color: #e8e4f4;
      letter-spacing: 0.02em;
      line-height: 1.2;
    }

    .modal-body {
      font-family: 'Fredoka One', cursive;
      font-size: 13.5px;
      color: rgba(160, 168, 200, 0.6);
      letter-spacing: 0.02em;
      line-height: 1.65;
      margin-top: 2px;
    }

    .modal-body em {
      font-style: normal;
      color: rgba(244,114,182,0.75);
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      width: 100%;
      margin-top: 10px;
    }

    .btn-cancel {
      flex: 1;
      padding: 10px 14px;
      font-family: 'Fredoka One', cursive;
      font-size: 13px;
      letter-spacing: 0.04em;
      color: rgba(160,170,210,0.55);
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 50px;
      cursor: pointer;
      transition: background 0.2s, color 0.2s, transform 0.15s;
    }

    .btn-cancel:hover {
      background: rgba(255,255,255,0.07);
      color: rgba(200,210,240,0.85);
      transform: scale(1.02);
    }

    .btn-confirm {
      flex: 1.5;
      padding: 10px 14px;
      font-family: 'Fredoka One', cursive;
      font-size: 13px;
      letter-spacing: 0.04em;
      color: #fff;
      background: linear-gradient(135deg, #7b2ff7cc, #f472b6cc);
      border: none;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 2px 14px rgba(123,47,247,0.3);
      transition: box-shadow 0.2s, transform 0.15s, filter 0.2s;
    }

    .btn-confirm:hover {
      box-shadow: 0 4px 22px rgba(123,47,247,0.55);
      filter: brightness(1.1);
      transform: scale(1.03);
    }
  </style>
</head>
<body>

  <div class="bg">
    <div class="orb"></div>
    <div class="orb"></div>
    <div class="orb"></div>
    <div class="orb"></div>
    <div class="orb"></div>
  </div>

  <div class="particles" id="particles"></div>

  <div class="content">
    <h1>shhhhh.</h1>

    <div class="search-wrapper">
      <input
        class="search-bar"
        type="text"
        placeholder="search quietly..."
        id="searchInput"
        autocomplete="off"
        spellcheck="false"
      />
      <button class="search-btn" id="searchBtn" aria-label="Search">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </button>
    </div>

    <div class="bookmarks">
      <a class="bookmark" href="https://www.google.com">
        <div class="bookmark-icon">
          <img src="https://raw.githubusercontent.com/TerminatedZ/terminatedz.github.io/main/google.webp" alt="Google">
        </div>
        <span class="bookmark-label">Google</span>
      </a>
      <a class="bookmark" href="https://www.youtube.com">
        <div class="bookmark-icon">
          <img src="https://raw.githubusercontent.com/TerminatedZ/terminatedz.github.io/main/youtube.png" alt="YouTube">
        </div>
        <span class="bookmark-label">YouTube</span>
      </a>
      <a class="bookmark" href="https://www.coolmathgames.com">
        <div class="bookmark-icon">
          <img src="https://raw.githubusercontent.com/TerminatedZ/terminatedz.github.io/main/CMG.svg" alt="Cool Math Games">
        </div>
        <span class="bookmark-label">Cool Math Games</span>
      </a>
      <a class="bookmark" href="https://quiz-30.github.io/">
        <div class="bookmark-icon">
          <img src="https://raw.githubusercontent.com/TerminatedZ/terminatedz.github.io/main/drive.png" alt="Quiz-30">
        </div>
        <span class="bookmark-label">Quiz-30</span>
      </a>
      <div class="bookmark" id="unblockerBtn" style="cursor:pointer;">
        <div class="bookmark-icon">
          <img src="https://raw.githubusercontent.com/TerminatedZ/terminatedz.github.io/main/link.png" alt="Unblocker" style="filter:invert(1);" onerror="this.parentElement.innerHTML='🔗';">
        </div>
        <span class="bookmark-label">Unblocker</span>
      </div>
    </div>
  </div>

  <!-- Confirmation Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-title">unblocker may be a bit slow 🌚</div>
      <div class="modal-body">
        unblocker has alot of extra stuff to do to ensure avoidance against firewalls.
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" id="modalCancel">go back</button>
        <button class="btn-confirm" id="modalConfirm">yeah, take me there</button>
      </div>
    </div>
  </div>

  <div id="toast" style="position:fixed;bottom:24px;left:24px;background:rgba(2,2,6,0.92);border:1.5px solid rgba(244,114,182,0.35);color:rgba(244,114,182,0.9);font-family:'Fredoka One',cursive;font-size:14px;letter-spacing:0.03em;padding:10px 18px;border-radius:12px;box-shadow:0 4px 20px rgba(0,0,0,0.6);backdrop-filter:blur(12px);z-index:9999;opacity:0;transform:translateY(10px);transition:opacity 0.3s,transform 0.3s;pointer-events:none;"></div>

  <script>
    // Particles
    const container = document.getElementById('particles');
    for (let i = 0; i < 28; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      const size = Math.random() * 6 + 2;
      p.style.cssText = `
        width: ${size}px;
        height: ${size}px;
        left: ${Math.random() * 100}%;
        animation-duration: ${Math.random() * 12 + 8}s;
        animation-delay: -${Math.random() * 20}s;
      `;
      container.appendChild(p);
    }

    // Search
    function doSearch() {
      const q = document.getElementById('searchInput').value.trim();
      if (q) window.location.href = `https://www.google.com/search?q=${encodeURIComponent(q)}`;
    }
    document.getElementById('searchBtn').addEventListener('click', doSearch);
    document.getElementById('searchInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') doSearch();
    });

    // Toast
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.style.opacity = '1';
      t.style.transform = 'translateY(0)';
      clearTimeout(t._timer);
      t._timer = setTimeout(() => {
        t.style.opacity = '0';
        t.style.transform = 'translateY(10px)';
      }, 3000);
    }

    // Modal logic
    const overlay = document.getElementById('modalOverlay');

    function openModal() {
      overlay.classList.add('show');
    }

    function closeModal() {
      overlay.classList.remove('show');
    }

    // Close on backdrop click
    overlay.addEventListener('click', e => {
      if (e.target === overlay) closeModal();
    });

    // Close on Escape
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeModal();
    });

    document.getElementById('modalCancel').addEventListener('click', closeModal);

    document.getElementById('modalConfirm').addEventListener('click', async () => {
      closeModal();
      try {
        const res = await fetch('https://terminatedz.github.io/link.txt?t=' + Date.now(), {cache: 'no-store'});
        if (!res.ok) { showToast('Dead or No link detected'); return; }
        const text = (await res.text()).trim();
        if (!text || !text.startsWith('http')) { showToast('Dead or No link detected'); return; }
        window.location.href = text;
      } catch {
        showToast('No Link Detected');
      }
    });

    document.getElementById('unblockerBtn').addEventListener('click', openModal);
  </script>
</body>
</html>
